name: Bench diff

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  bench-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq
      - name: Run bench-diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BENCH_COUNT: '10'
        run: bash scripts/bench-diff.sh
      - name: Upload bench logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            base.txt
            head.txt
          retention-days: 14
