# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  lint:
    runs-on: ubuntu-latest
    name: golangci-lint
    steps:
      - uses: actions/checkout@v4
        with:
          # Stop checkout from persisting an auth extraheader via
          # $GIT_CONFIG_PARAMETERS — it collides with the `-c` flags
          # that `golangci-lint custom` passes to its internal git clone.
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.5.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Debug git environment
        run: |
          echo "=== env (GIT_*) ==="
          env | grep -i '^GIT' || true
          echo "=== git config --list --show-origin ==="
          git config --list --show-origin || true
          echo "=== /etc/gitconfig ==="
          cat /etc/gitconfig 2>/dev/null || echo "(absent)"
          echo "=== \$HOME/.gitconfig ==="
          cat "$HOME/.gitconfig" 2>/dev/null || echo "(absent)"
      - name: Build custom-gcl (embeds gerpolint plugin)
        run: golangci-lint custom -v
      - name: Run custom-gcl
        run: ./bin/custom-gcl run ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.24' ]
    name: Go ${{ matrix.go }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
  codecov:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.24' ]
    name: Go ${{ matrix.go }} / Codecov
    steps:
      - uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -coverprofile=coverage.txt.tmp -covermode=atomic ./...
      - name: Exclude adapters
        run: cat coverage.txt.tmp | grep -v "/adapters/" > coverage.txt && rm coverage.txt.tmp
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}