# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  lint:
    runs-on: ubuntu-latest
    name: golangci-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      # golangci-lint v2.5.0 has a bug in pkg/commands/internal/builder.go:95 —
      # it passes `"-c advice.detachedHead=false"` as one argv token to
      # `git clone`. Older git trims the leading space; newer git (on
      # github-hosted runners) doesn't and fails with exit 128 / "invalid
      # key:  advice.detachedHead" (note the double space). Until fixed
      # upstream, build golangci-lint from source with the flag split in two.
      - name: Install golangci-lint (v2.5.0, patched)
        run: |
          git clone --depth 1 --branch v2.5.0 \
            https://github.com/golangci/golangci-lint.git /tmp/glc-src
          sed -i 's|"-c advice\.detachedHead=false"|"-c", "advice.detachedHead=false"|' \
            /tmp/glc-src/pkg/commands/internal/builder.go
          (cd /tmp/glc-src && go build -o "$(go env GOPATH)/bin/golangci-lint" ./cmd/golangci-lint)
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build custom-gcl (embeds gerpolint plugin)
        run: golangci-lint custom
      - name: Run custom-gcl
        run: ./bin/custom-gcl run ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.24' ]
    name: Go ${{ matrix.go }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
  codecov:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.24' ]
    name: Go ${{ matrix.go }} / Codecov
    steps:
      - uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -coverprofile=coverage.txt.tmp -covermode=atomic ./...
      - name: Exclude adapters
        run: cat coverage.txt.tmp | grep -v "/adapters/" > coverage.txt && rm coverage.txt.tmp
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}