services:
  postgres:
    image: postgres:16
    container_name: gerpo_integration_pg
    environment:
      POSTGRES_USER: gerpo
      POSTGRES_PASSWORD: gerpo
      POSTGRES_DB: gerpo
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gerpo -d gerpo"]
      interval: 2s
      timeout: 5s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data
