# git-cliff configuration for gerpo.
# See https://git-cliff.org/docs/configuration for the full reference.

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
Commits follow [Conventional Commits](https://www.conventionalcommits.org/).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{%- endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",         group = "Features" },
  { message = "^fix",          group = "Bug Fixes" },
  { message = "^perf",         group = "Performance" },
  { message = "^refactor",     group = "Refactor" },
  { message = "^docs",         group = "Documentation" },
  { message = "^test",         group = "Tests" },
  { message = "^ci",           group = "CI / Build" },
  { message = "^build",        group = "CI / Build" },
  { message = "^chore",        group = "Misc" },
  { message = "^src",          group = "Misc" },
  { message = "^style",        skip = true },
  { message = "^revert",       group = "Reverts" },
  { body = ".*[Bb]reaking [Cc]hange", group = "BREAKING CHANGES" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
