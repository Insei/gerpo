stages:
  - test

variables:
  POSTGRES_USER: gerpo
  POSTGRES_PASSWORD: gerpo
  POSTGRES_DB: gerpo
  GERPO_INTEGRATION_DB_URL: "postgres://gerpo:gerpo@postgres:5432/gerpo?sslmode=disable"

.go-base:
  image: golang:1.23
  before_script:
    - go version
    - go mod download

unit:
  extends: .go-base
  stage: test
  script:
    - go build -v ./...
    - go test -v -race ./...

integration:
  extends: .go-base
  stage: test
  services:
    - name: postgres:16
      alias: postgres
  script:
    - go test -v -tags=integration ./tests/integration/...

bench-diff:
  extends: .go-base
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    GIT_DEPTH: "50"
    BENCH_COUNT: "10"
  before_script:
    - go version
    - go mod download
    - apt-get update && apt-get install -y --no-install-recommends jq
  script:
    - bash scripts/bench-diff.sh
  artifacts:
    when: always
    paths:
      - base.txt
      - head.txt
    expire_in: 1 week
  allow_failure: true
